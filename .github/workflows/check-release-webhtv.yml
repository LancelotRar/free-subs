name: Check fish2018/webhtv Release

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Force re-notify even if already notified
        type: boolean
        default: false

permissions: {}

concurrency:
  group: webhtv-release
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      REPO: fish2018/webhtv
    steps:
      - name: Cache last release ID
        id: cache
        uses: actions/cache@v5.0.5
        with:
          path: last_release_id.txt
          key: webhtv-release-id
          restore-keys: webhtv-release-id-

      - name: Check and notify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FORCE: ${{ inputs.force || '' }}
        run: |
          cat > /tmp/check_release.py << 'PYEOF'
          import json, os, re, sys, urllib.error, urllib.request
          from html import escape

          REPO = os.environ["REPO"]
          FORCE = os.environ.get("FORCE", "").lower() == "true"
          GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN", "")

          # --- Validate required secrets (fail fast with clear error) ---
          for var in ("TG_BOT_TOKEN", "TG_CHAT_ID"):
              if not os.environ.get(var):
                  print(f"::error::Missing required env var: {var}")
                  sys.exit(1)

          # --- Read last known release ID ---
          last_id = 0
          try:
              with open("last_release_id.txt") as f:
                  last_id = int(f.read().strip())
          except Exception:
              pass

          # --- Build GitHub API headers (optional token raises limit 60 -> 5000/h) ---
          api_headers = {
              "User-Agent": "GitHub-Actions",
              "Accept": "application/vnd.github+json",
          }
          if GITHUB_TOKEN:
              api_headers["Authorization"] = f"Bearer {GITHUB_TOKEN}"

          # --- Fetch latest release from GitHub (including pre-releases) ---
          url = f"https://api.github.com/repos/{REPO}/releases?per_page=1"
          req = urllib.request.Request(url, headers=api_headers)
          try:
              with urllib.request.urlopen(req) as resp:
                  releases = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              print(f"::error::GitHub API HTTP {e.code}: {e.reason}")
              sys.exit(1)
          except Exception as e:
              print(f"::error::Failed to fetch GitHub releases: {e}")
              sys.exit(1)

          if not releases:
              print("No releases yet — exiting normally")
              sys.exit(0)

          data = releases[0]
          latest_id = data["id"]
          print(f"Last ID: {last_id}, Latest ID: {latest_id}, Force: {FORCE}")

          if not FORCE and latest_id <= last_id:
              print("No new release")
              sys.exit(0)

          print("New release found, sending notification…")

          # --- Build message ---
          raw_body = (data.get("body") or "").strip()
          if not raw_body:
              # Fall back to commit message; target_commitish may be branch/tag/SHA
              commit_ref = data["target_commitish"]
              commit_url = f"https://api.github.com/repos/{REPO}/commits/{commit_ref}"
              try:
                  with urllib.request.urlopen(
                      urllib.request.Request(commit_url, headers=api_headers)
                  ) as resp:
                      commit_data = json.loads(resp.read())
                  raw_body = commit_data["commit"]["message"]
              except Exception:
                  raw_body = ""
          raw_body = raw_body[:1500]
          if raw_body.strip():
              raw_body = re.sub(r"^\s*###+\s*", "", raw_body, flags=re.MULTILINE)
              raw_body = re.sub(r"\n{3,}", "\n\n", raw_body)
              raw_body = raw_body.strip()
              body = escape(raw_body)
              body = re.sub(
                  r"https?://[^\s<]+",
                  lambda m: f'<a href="{m.group(0)}">{m.group(0)}</a>',
                  body,
              )
          else:
              body = "无"

          rel_name = escape(data.get("name") or data["tag_name"])
          pub_date = data["published_at"][:10]
          rel_url = data["html_url"]

          assets_lines = []
          for a in data.get("assets", []):
              size_mb = round(a["size"] / 1_048_576, 1)
              name = escape(a["name"])
              assets_lines.append(
                  f'• <a href="{a["browser_download_url"]}">{name}</a> ({size_mb} MB)'
              )
          assets_text = "\n".join(assets_lines) if assets_lines else "（无 Assets）"

          text = (
              f"🚀<b>鱼佬WebHTV 新版本发布！</b>\n\n"
              f"📢<a href=\"https://t.me/webhtv\">TG讨论群</a>\n\n"
              f"🌀<b>版本：</b>{rel_name}\n"
              f"🍾<b>发布时间：</b>{pub_date}\n"
              f'🔗<a href="{rel_url}">查看完整 Release</a>\n\n'
              f"📦<b>下载 Assets：</b>\n{assets_text}"
          )

          # --- Send to Telegram ---
          payload = json.dumps({
              "chat_id": os.environ["TG_CHAT_ID"],
              "parse_mode": "HTML",
              "disable_web_page_preview": True,
              "text": text,
          }).encode()

          req2 = urllib.request.Request(
              f'https://api.telegram.org/bot{os.environ["TG_BOT_TOKEN"]}/sendMessage',
              data=payload,
              headers={"Content-Type": "application/json"},
          )
          try:
              with urllib.request.urlopen(req2) as resp:
                  result = json.loads(resp.read())
              if not result.get("ok"):
                  print(f'::error::Telegram error: {result.get("description")}')
                  sys.exit(1)
          except Exception as e:
              print(f"::error::Failed to send Telegram message: {e}")
              sys.exit(1)

          # --- Persist new ID only AFTER successful notification ---
          # If Telegram fails above, last_release_id.txt is NOT updated, so the
          # cache save step keeps the old ID and the next run will retry.
          with open("last_release_id.txt", "w") as f:
              f.write(str(latest_id))
          print(f"Telegram notification sent and release ID persisted: {latest_id}")
          PYEOF

          python3 /tmp/check_release.py

      - name: Save cache
        if: always()
        uses: actions/cache/save@v5.0.5
        with:
          path: last_release_id.txt
          key: ${{ steps.cache.outputs.primary-key }}
