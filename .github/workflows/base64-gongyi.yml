name: base64-gongyi-update

on:
  schedule:
    - cron: '50 */2 * * *'
  workflow_dispatch: 

jobs:
  base64-gongyi-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开启写入权限，否则无法推送修改

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v6

      - name: 获取并合并内容
        run: |
          URL1="https://raw.githubusercontent.com/shaoyouvip/free/main/base64.txt"
          URL2="https://share-main1c1m2.lancelot.dpdns.org/sub?token=f01050d65be928f27f8455ae15b1dfd8&b64"
          URL3="https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub"
          OUTPUT="src/base64-gongyi.txt"

          rm -f /tmp/sub1_base64.txt /tmp/sub2_base64.txt /tmp/sub3_base64.txt /tmp/merged_plain.txt /tmp/decoded.txt

          echo "=== 下载源1 ==="
          HTTP1=$(curl -sL --max-time 15 -w "%{http_code}" -o /tmp/sub1_base64.txt "$URL1" 2>&1) || HTTP1=000
          echo "HTTP $HTTP1 | 大小: $(wc -c < /tmp/sub1_base64.txt 2>/dev/null || echo 0)"

          echo "=== 下载源2 ==="
          HTTP2=$(curl -sL --max-time 15 -w "%{http_code}" -o /tmp/sub2_base64.txt "$URL2" 2>&1) || HTTP2=000
          echo "HTTP $HTTP2 | 大小: $(wc -c < /tmp/sub2_base64.txt 2>/dev/null || echo 0)"

          echo "=== 下载源3 ==="
          HTTP3=$(curl -sL --max-time 15 -w "%{http_code}" -o /tmp/sub3_base64.txt "$URL3" 2>&1) || HTTP3=000
          echo "HTTP $HTTP3 | 大小: $(wc -c < /tmp/sub3_base64.txt 2>/dev/null || echo 0)"

          echo "=== 解码合并 ==="
          : > /tmp/merged_plain.txt

          for f in /tmp/sub1_base64.txt /tmp/sub2_base64.txt /tmp/sub3_base64.txt; do
            if [ ! -s "$f" ]; then
              echo "  ⚠️ 文件为空，跳过"
              continue
            fi
            base64 -d "$f" > /tmp/decoded.txt 2>/dev/null || { echo "  ⚠️ Base64 解码失败，跳过"; continue; }
            if ! head -c 200 /tmp/decoded.txt | grep -qE '^[a-z]+://'; then
              echo "  ⚠️ 解码后未发现有效代理链接，跳过"
              continue
            fi
            cnt=$(grep -cE '^[a-z]+://' /tmp/decoded.txt || true)
            echo "  ✅ $cnt 个节点"
            tr -d '\r' < /tmp/decoded.txt >> /tmp/merged_plain.txt
          done

          # 去重去空行
          sed -i '/^[[:space:]]*$/d' /tmp/merged_plain.txt
          sort -u /tmp/merged_plain.txt -o /tmp/merged_plain.txt

          TOTAL=$(wc -l < /tmp/merged_plain.txt)

          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ 所有源均无效，保留现有文件不变"
          else
            base64 -w0 /tmp/merged_plain.txt > "$OUTPUT"
            echo "✅ 合并完成：$TOTAL 个节点（已去重）"
          fi

      - name: 提交并推送更改
        env:
          TZ: Asia/Shanghai
        run: |
          git config --local user.email "Lancelot@liqun.com"
          git config --local user.name "Lancelot"
          
          # 检查文件是否有变动，避免没有更新时产生空的 commit
          git add src/base64-gongyi.txt
          if git diff --staged --quiet; then
            echo "内容无变化，跳过更新。"
          else
            git commit -m "base64订阅节点更新，地址不变。$(date "+%Y/%m/%d %H:%M")"
            git push
          fi
