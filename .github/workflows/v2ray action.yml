name: V2Ray Update

on:
  schedule:
    - cron: '0 * * * *' # 每小时执行一次（第0分钟执行）
  workflow_dispatch: # 允许你随时在 GitHub 页面手动点击运行

jobs:
  update-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开启写入权限，否则无法推送修改

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 获取并覆盖内容
        run: |
          # 确保 src 目录存在
          mkdir -p src
          # 下载文件并直接覆盖目标路径
          curl -sL "https://ghfast.top/https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/v.txt" -o src/v2ray.txt
          echo "文件已抓取完成"

      - name: 提交并推送更改
        run: |
          git config --local user.email "Lancelot@helloworld.com"
          git config --local user.name "Lancelot"
          
          # 检查文件是否有变动，避免没有更新时产生空的 commit
          git add src/v2ray.txt
          if git diff --staged --quiet; then
            echo "内容无变化，跳过更新。"
          else
            git commit -m "自动更新 v2ray.txt: $(date)"
            git push
          fi
