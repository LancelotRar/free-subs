name: base64-fangshilian-update

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch: 

jobs:
  base64-fangshilian-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开启写入权限，否则无法推送修改

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v6

      - name: 获取并保存内容
        run: |
          URL="${{ secrets.BASE64_FSL_URL1 }}"
          OUTPUT="src/base64-fangshilian.txt"

          echo "=== 下载 ==="
          HTTP=$(curl -sL --max-time 15 -w "%{http_code}" -o /tmp/sub_base64.txt "$URL" 2>&1) || HTTP=000
          echo "HTTP $HTTP | 大小: $(wc -c < /tmp/sub_base64.txt 2>/dev/null || echo 0)"

          if [ ! -s /tmp/sub_base64.txt ]; then
            echo "❌ 下载为空，保留现有文件"
            exit 0
          fi

          echo "=== 解码处理 ==="
          base64 -d /tmp/sub_base64.txt > /tmp/decoded.txt 2>/dev/null || { echo "❌ Base64 解码失败"; exit 1; }

          # 去 \r、去空行、去重、排序（同时确保末尾换行，防止行合并）
          tr -d '\r' < /tmp/decoded.txt > /tmp/merged_plain.txt
          echo >> /tmp/merged_plain.txt
          sed -i '/^[[:space:]]*$/d' /tmp/merged_plain.txt
          sort -u /tmp/merged_plain.txt -o /tmp/merged_plain.txt

          TOTAL=$(wc -l < /tmp/merged_plain.txt)
          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ 解码后无有效内容，保留现有文件"
            exit 0
          fi

          base64 -w0 /tmp/merged_plain.txt > "$OUTPUT"
          echo "✅ 处理完成：$TOTAL 个节点"

      - name: 提交并推送更改
        env:
          TZ: Asia/Shanghai
        run: |
          git config --local user.email "Lancelot@liqun.com"
          git config --local user.name "Lancelot"
          
          # 检查文件是否有变动，避免没有更新时产生空的 commit
          git add src/base64-fangshilian.txt
          if git diff --staged --quiet; then
            echo "内容无变化，跳过更新。"
          else
            git commit -m "防失联base64订阅节点更新，地址不变。$(date "+%Y/%m/%d %H:%M")"
            git push
          fi
