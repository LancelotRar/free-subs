name: Check Silent1566/webhtv Release

on:
  schedule:
    - cron: '17 16 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Force re-notify even if already notified
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: webhtv-silent1566-release
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      REPO: Silent1566/webhtv
      CACHE_KEY: webhtv-silent1566-release-id
      NOTIFY_TITLE: 不懂佬WebHTV
      NOTIFY_GROUP_URL: https://t.me/Silent1566Group
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Restore last release ID
        id: cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: last_release_id.txt
          key: ${{ env.CACHE_KEY }}-${{ github.run_number }}
          restore-keys: |
            ${{ env.CACHE_KEY }}-

      - name: Check and notify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FORCE: ${{ inputs.force || '' }}
        run: python3 .github/scripts/check_release.py

      - name: Save cache
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: last_release_id.txt
          key: ${{ env.CACHE_KEY }}-${{ github.run_number }}
