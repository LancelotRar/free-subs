mode: rule
mixed-port: 7890
port: 7891
socks-port: 7892
redir-port: 7893
tproxy-port: 7894
allow-lan: true
log-level: info
external-controller: 0.0.0.0:9090
bind-address: "*"
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
ipv6: false
tcp-concurrent: true
unified-delay: true
find-process-mode: strict
keep-alive-interval: 60
keep-alive-idle: 600

experimental:
  quic-go-disable-gso: true

tun:
  enable: false
  auto-detect-interface: true
  auto-route: true
  strict-route: true
  auto-redirect: true
  device: mihomo
  disable-icmp-forwarding: true
  dns-hijack:
  - any:53
  - tcp://any:53
  mtu: 1500
  stack: mixed

dns:
  enable: true
  ipv6: false
  listen: :1053
  cache-algorithm: arc
  use-hosts: true
  respect-rules: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - rule-set:private
    - rule-set:cn
  default-nameserver:
    - 223.6.6.6
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.google/dns-query
    - https://dns.cloudflare.com/dns-query
  direct-nameserver:
    - system
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

hosts:
  dns.alidns.com:
    - 223.5.5.5
    - 223.6.6.6
  doh.pub:
    - 1.12.12.12
    - 120.53.53.53
  dns.cloudflare.com:
    - 1.1.1.1
    - 1.0.0.1
  dns.google:
    - 8.8.8.8
    - 8.8.4.4
  services.googleapis.cn:
    - services.googleapis.com

profile:
  store-selected: true
  store-fake-ip: true

proxy-providers:
  利群优选公益订阅:
    type: http
    lazy: true
    url: https://lq-free.lancelot.dpdns.org/c/?token=@liqunchannel-yx
    interval: 3600
    path: ./proxy_provider/clash-gy-lq-yx.yaml
    proxy: DIRECT
    header:
      User-Agent: 
        - clash.meta 
                  
proxy-groups:
  - name: 🥳打包代理
    type: select
    proxies:
      - ✅自动选择
      - 🫱手动选择
      - DIRECT
      - ⚖️负载均衡
      - ⭕故障切换

  - name: 🎯国内直连
    type: select
    proxies:
      - DIRECT
      - ✅自动选择
      - 🫱手动选择
      - ⚖️负载均衡
      - ⭕故障切换

  - name: 🌀境外畅通
    type: select
    proxies:
      - DIRECT
      - ✅自动选择       
      - 🫱手动选择
      - ⚖️负载均衡
      - ⭕故障切换

  - name: ✅自动选择
    type: url-test
    interval: 300
    lazy: true
    tolerance: 100
    url: https://www.gstatic.com/generate_204
    include-all: true
    timeout: 2000

  - name: 🫱手动选择
    type: select
    lazy: true
    include-all: true
    timeout: 2000

  - name: ⚖️负载均衡
    type: load-balance
    interval: 300
    lazy: true
    url: https://www.gstatic.com/generate_204
    strategy: consistent-hashing
    include-all: true
    timeout: 2000

  - name: ⭕故障切换
    type: fallback
    interval: 300
    lazy: true
    url: https://www.gstatic.com/generate_204
    include-all: true
    timeout: 2000

  - name: ⚠️拒绝连接
    type: select
    proxies:
      - REJECT
      - ✅自动选择
      - 🫱手动选择
      - ⚖️负载均衡
      - ⭕故障切换    

