rules:
  # 私有网络直连
  - RULE-SET,private,🎯国内直连
  - RULE-SET,privateip,🎯国内直连,no-resolve

  # 自定义直连
  - DOMAIN-SUFFIX,dpdns.org,🎯国内直连

  # 国内直连
  - RULE-SET,apple_cn,🎯国内直连
  - RULE-SET,microsoft_cn,🎯国内直连
  - RULE-SET,cloudflare_cn,🎯国内直连

  # 拦截规则
  - RULE-SET,category-ads-all,⚠️拒绝连接

  # 域名代理规则
  - RULE-SET,telegram,🥳打包代理
  - RULE-SET,steam,🥳打包代理
  - RULE-SET,ai,🥳打包代理  
  - RULE-SET,apple,🥳打包代理
  - RULE-SET,cloudflare,🥳打包代理
  - RULE-SET,googlefcm,🥳打包代理  
  - RULE-SET,google,🥳打包代理
  - RULE-SET,github,🥳打包代理
  - RULE-SET,twitter,🥳打包代理
  - RULE-SET,microsoft,🥳打包代理

  # IP代理规则
