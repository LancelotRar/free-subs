mode: rule
mixed-port: 7890
port: 7891
socks-port: 7892
redir-port: 7893
tproxy-port: 7894
allow-lan: true
global-ua: clash.meta
log-level: warning
external-controller: 0.0.0.0:9090
bind-address: "*"
ipv6: true
tcp-concurrent: true
unified-delay: true
find-process-mode: strict

tun:
  enable: false
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  ipv6: true
  prefer-h3: false
  listen: 0.0.0.0:7874
  use-hosts: false
  use-system-hosts: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - time.*.com
    - ntp.*.com
    - "+.market.xiaomi.com"
    - asusrouter.com
    - router.asus.com
    - www.asusrouter.com
    - oasisauth.h3c.com
    - routerlogin.com
    - www.routerlogin.com
    - tplogin.cn
    - miwifi.com
    - www.miwifi.com
    - "+.internal"
    - "+.localdomain"
    - "+.example"
    - "+.invalid"
    - "+.localhost"
    - "+.test"
    - "+.local"
    - "+.lan"
    - "+.zte.home"
    - "+.my.router"
    - "+.ts.net"
    - "+.home.arpa"
    - "+.hiwifi.com"
    - "+.tplinkwifi.net"
    - "+.tendawifi.com"
    - "+.leike.cc"
    - "+.plex.direct"
    - "+.router.ctc"
    - "+.phicomm.me"
    - "+.peiluyou.com"
    - "+.127.in-addr.arpa"
    - geosite:private
    - geosite:cn
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - tls://8.8.4.4
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query  

sniffer:
  enable: true
  override-destination: true
  sniff:
    QUIC:
      ports:
        - 443
        - 8443
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
  parse-pure-ip: true
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geodata-loader: memconservative
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb"
  asn: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb"
profile:
  store-selected: true
  store-fake-ip: true

proxy-providers:
  利群公益:
    type: http
    url: "https://sharecm1.lancelot.dpdns.org/sub?token=bdf2b8e6a427b51e5a0fe6dfae5493f5&clash"
    interval: 10800
    path: "./proxy_provider/liqun.yaml"
    proxy: DIRECT
    header:
      User-Agent: 
        - clash.meta
    override:
      additional-prefix: "[利群公益]"
      skip-cert-verify: false
      udp: true
                 
proxy-groups:
  - name: 🥳打包代理
    type: select
    proxies:
      - ✅自动选择
      - ⚖️负载均衡
      - 🫱手动选择
      - ⭕故障切换
      - 🎯全球直连

  - name: ✅自动选择
    type: url-test
    interval: 300
    lazy: true
    tolerance: 200
    url: https://www.gstatic.com/generate_204
    include-all: true
    timeout: 2000

  - name: 🫱手动选择
    type: select
    include-all: true
    timeout: 2000

  - name: ⚖️负载均衡
    type: load-balance
    interval: 300
    lazy: true
    url: https://www.gstatic.com/generate_204
    strategy: round-robin
    include-all: true
    timeout: 2000

  - name: ⭕故障切换
    type: fallback
    interval: 300
    lazy: true
    url: https://www.gstatic.com/generate_204
    include-all: true
    timeout: 2000

  - name: 🎯全球直连
    type: select
    proxies:
      - DIRECT
      - ✅自动选择
      - ⚖️负载均衡
      - 🫱手动选择
      - ⭕故障切换

  - name: ⚠️屏蔽广告
    type: select
    proxies:
      - REJECT
      - ✅自动选择
      - ⚖️负载均衡
      - 🫱手动选择
      - ⭕故障切换

rule-providers:
  reject:
    type: http
    behavior: domain
    proxy: DIRECT
    interval: 86400
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: "./ruleset/dn/reject.yaml"

  direct:
    type: http
    behavior: domain
    proxy: DIRECT
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/dn/direct.yaml
    interval: 86400


  private:
    type: http
    behavior: domain
    proxy: DIRECT
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/dn/private.yaml
    interval: 86400

  # IP规则集
  telegramcidr:
    type: http
    behavior: ipcidr
    proxy: DIRECT
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./ruleset/ip/telegramcidr.yaml
    interval: 86400

  cncidr:
    type: http
    behavior: ipcidr
    proxy: DIRECT
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
    path: ./ruleset/ip/cncidr.yaml
    interval: 86400

  lancidr:
    type: http
    behavior: ipcidr
    proxy: DIRECT
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
    path: ./ruleset/ip/lancidr.yaml
    interval: 86400

rules:
  - RULE-SET,reject,⚠️屏蔽广告
  - RULE-SET,telegramcidr,🥳打包代理
  # rule-set规则集
  - RULE-SET,private,🎯全球直连
  - RULE-SET,direct,🎯全球直连
  - RULE-SET,lancidr,🎯全球直连,no-resolve
  - RULE-SET,cncidr,🎯全球直连,no-resolve
  - MATCH,🥳打包代理
