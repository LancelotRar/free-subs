mode: rule
mixed-port: 7890
port: 7891
socks-port: 7892
redir-port: 7893
tproxy-port: 7894
allow-lan: true
log-level: info
external-controller: 0.0.0.0:9090
bind-address: "*"
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
secret: ""
ipv6: false
tcp-concurrent: true
unified-delay: true
find-process-mode: strict
keep-alive-interval: 60
keep-alive-idle: 600
global-ua: clash.meta

experimental:
  quic-go-disable-gso: true

tun:
  enable: false
  auto-detect-interface: true
  auto-route: true
  auto-redirect: true
  device: Mihomo
  dns-hijack:
  - any:53
  - tcp://any:53
  mtu: 1500
  stack: mixed

dns:
  enable: true
  ipv6: false
  listen: :1053
  cache-algorithm: arc
  use-hosts: true
  respect-rules: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - rule-set:private
  default-nameserver:
    - 223.6.6.6
    - 8.8.8.8  
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - 8.8.8.8
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - system
    - 223.5.5.5
    - 119.29.29.29
    
hosts:
  dns.alidns.com:
    - 223.5.5.5
    - 223.6.6.6
  doh.pub:
    - 1.12.12.12
    - 120.53.53.53
  dns.cloudflare.com:
    - 1.1.1.1
    - 1.0.0.1
  dns.google:
    - 8.8.8.8
    - 8.8.4.4
  services.googleapis.cn:
    - services.googleapis.com

sniffer:
  enable: true
  override-destination: false
  parse-pure-ip: false
  sniff:
    QUIC:
      ports:
        - 443
        - 8443
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true

geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geodata-loader: memconservative
geox-url:
  geoip: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  asn: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb

profile:
  store-selected: true
  store-fake-ip: true
                  
proxy-providers:
                
                  
proxy-groups:
  - name: 🥳打包代理
    type: select
    proxies:
      - ✅自动选择
      - 🫱手动选择
      - DIRECT
      - ⚖️负载均衡
      - ⭕故障切换

  - name: 🎯国内直连
    type: select
    proxies:
      - DIRECT
      - ✅自动选择
      - 🫱手动选择
      - ⚖️负载均衡
      - ⭕故障切换

  - name: 🌀境外畅通
    type: select
    proxies:
      - DIRECT
      - ✅自动选择
      - 🫱手动选择
      - ⚖️负载均衡
      - ⭕故障切换

  - name: ⚠️拒绝连接
    type: select
    proxies:
      - REJECT
      - ✅自动选择
      - 🫱手动选择
      - ⚖️负载均衡
      - ⭕故障切换

  - name: ✅自动选择
    type: url-test
    interval: 300
    lazy: true
    tolerance: 100
    url: https://www.gstatic.com/generate_204
    include-all: true
    timeout: 2000

  - name: 🫱手动选择
    type: select
    lazy: true
    include-all: true
    timeout: 2000

  - name: ⚖️负载均衡
    type: load-balance
    interval: 300
    lazy: true
    url: https://www.gstatic.com/generate_204
    strategy: consistent-hashing
    include-all: true
    timeout: 2000

  - name: ⭕故障切换
    type: fallback
    interval: 300
    lazy: true
    url: https://www.gstatic.com/generate_204
    include-all: true
    timeout: 2000

rule-providers:
  category-ads-all:
    type: http
    behavior: domain
    proxy: DIRECT
    format: mrs  
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/category-ads-all.mrs
    path: ./ruleset/dn/category-ads-all.mrs
    interval: 86400
  
  tracking:
    type: http
    behavior: domain
    proxy: DIRECT
    format: mrs
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/category-tracker.mrs
    path: ./ruleset/dn/tracking.mrs
    interval: 86400
  
  cn:
    type: http
    behavior: domain
    proxy: DIRECT
    format: mrs    
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/cn.mrs 
    path: ./ruleset/dn/cn.mrs
    interval: 86400  

  private:
    type: http
    behavior: domain
    proxy: DIRECT
    format: mrs
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/private.mrs
    path: ./ruleset/dn/private.mrs
    interval: 86400

  google:
    type: http
    behavior: domain
    proxy: DIRECT
    format: mrs
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/google.mrs
    path: ./ruleset/dn/google.mrs
    interval: 86400

  gfw:
    type: http
    behavior: domain
    proxy: DIRECT
    format: mrs
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/gfw.mrs
    path: ./ruleset/dn/gfw.mrs
    interval: 86400

  github:
    type: http
    behavior: domain
    proxy: DIRECT
    format: mrs
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/github.mrs
    path: ./ruleset/dn/github.mrs
    interval: 86400

  microsoft:
    type: http
    behavior: domain
    proxy: DIRECT
    format: mrs
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/microsoft.mrs
    path: ./ruleset/dn/microsoft.mrs
    interval: 86400

  telegram:
    type: http
    behavior: domain
    proxy: DIRECT
    format: mrs
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/telegram.mrs
    path: ./ruleset/dn/telegram.mrs
    interval: 86400

  # IP规则集
  telegramip:
    type: http
    behavior: ipcidr
    proxy: DIRECT
    format: mrs 
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/telegram.mrs
    path: ./ruleset/ip/telegramip.mrs
    interval: 86400

  googleip:
    type: http
    behavior: ipcidr
    proxy: DIRECT
    format: mrs 
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/google.mrs
    path: ./ruleset/ip/googleip.mrs
    interval: 86400    

  privateip:
    type: http
    behavior: ipcidr
    proxy: DIRECT
    format: mrs    
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/private.mrs
    path: ./ruleset/ip/privateip.mrs
    interval: 86400

  cnip:
    type: http
    behavior: ipcidr
    proxy: DIRECT
    format: mrs 
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/cn.mrs
    path: ./ruleset/ip/cnip.mrs
    interval: 86400

rules:
  # 拦截规则
  - RULE-SET,category-ads-all,⚠️拒绝连接
  - RULE-SET,tracking,⚠️拒绝连接
 
  # 自定义直连
  - DOMAIN-SUFFIX,dpdns.org,🎯国内直连

  # 私有网络直连
  - RULE-SET,private,🎯国内直连
  - RULE-SET,privateip,🎯国内直连,no-resolve

  # 代理规则
  - RULE-SET,telegram,🥳打包代理
  - RULE-SET,google,🥳打包代理
  - RULE-SET,github,🥳打包代理
  - RULE-SET,microsoft,🥳打包代理
  - RULE-SET,gfw,🥳打包代理
  - RULE-SET,telegramip,🥳打包代理,no-resolve
  - RULE-SET,googleip,🥳打包代理,no-resolve

  # 国内直连
  - RULE-SET,cn,🎯国内直连
  - RULE-SET,cnip,🎯国内直连,no-resolve

  # 兜底规则
  - MATCH,🌀境外畅通
