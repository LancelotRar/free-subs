rules:
  # 私有网络直连
  - RULE-SET,private,🇨🇳打包直连
  - RULE-SET,privateip,🇨🇳打包直连,no-resolve

  # 自定义直连
  - DOMAIN-SUFFIX,dpdns.org,🇨🇳打包直连
  - DOMAIN-SUFFIX,cnb.cool,🇨🇳打包直连
  - DOMAIN-SUFFIX,1ms.run,🇨🇳打包直连
  - DOMAIN-SUFFIX,1panel.live,🇨🇳打包直连

  # 国内直连
  - RULE-SET,apple_cn,🇨🇳打包直连
  - RULE-SET,microsoft_cn,🇨🇳打包直连
  - RULE-SET,cloudflare_cn,🇨🇳打包直连

  # 拦截规则
  - RULE-SET,category-ads-all,❗️广告拦截

  # 域名代理规则
  - RULE-SET,telegram,🚀打包代理
  - RULE-SET,steam,🚀打包代理
  - RULE-SET,ai,🚀打包代理
  - RULE-SET,apple,🚀打包代理
  - RULE-SET,cloudflare,🚀打包代理
  - RULE-SET,googlefcm,🚀打包代理
  - RULE-SET,youtube,🚀打包代理
  - RULE-SET,google,🚀打包代理
  - RULE-SET,docker,🚀打包代理
  - RULE-SET,github,🚀打包代理
  - RULE-SET,twitter,🚀打包代理
  - RULE-SET,microsoft,🚀打包代理

  # IP代理规则
  - RULE-SET,telegramip,🚀打包代理,no-resolve
  - RULE-SET,googleip,🚀打包代理,no-resolve
  - RULE-SET,cloudflareip,🚀打包代理,no-resolve
  - RULE-SET,twitterip,🚀打包代理,no-resolve

  # 兜底规则
  - RULE-SET,gfw,🚀打包代理
  - RULE-SET,cn,🇨🇳打包直连
  - RULE-SET,cnip,🇨🇳打包直连
  - MATCH,🐠漏网之鱼
