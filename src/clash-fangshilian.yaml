    interval: 86400

  cn:
    type: http
    behavior: domain
    proxy: DIRECT
    format: mrs    
    url: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/cn.mrs"  
    path: ./ruleset/dn/cn.mrs
    interval: 86400  

  private:
    type: http
    behavior: domain
    proxy: DIRECT
