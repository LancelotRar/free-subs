    url: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/cn.mrs"
    path: ./ruleset/ip/cnip.mrs
    interval: 86400

rules:
  - RULE-SET,category-ads-all,⚠️拒绝连接
  - DOMAIN-SUFFIX,jsdelivr.net,🎯国内直连  
  - DOMAIN-SUFFIX,dpdns.org,🎯国内直连   
  - RULE-SET,telegram,🥳打包代理   
  - RULE-SET,google,🥳打包代理  
  - RULE-SET,github,🥳打包代理  
  - RULE-SET,microsoft,🥳打包代理 
  - RULE-SET,gfw,🥳打包代理 
  - RULE-SET,private,🎯国内直连 
  - RULE-SET,cn,🎯国内直连 
  - RULE-SET,privateip,🎯国内直连,no-resolve   
  - RULE-SET,cnip,🎯国内直连,no-resolve   
  - RULE-SET,telegramip,🥳打包代理,no-resolve  
  - RULE-SET,googleip,🥳打包代理,no-resolve  
  - MATCH,🌀境外畅通
