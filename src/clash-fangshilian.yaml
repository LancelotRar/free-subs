mode: rule
mixed-port: 7890
port: 7891
socks-port: 7892
redir-port: 7893
tproxy-port: 7894
allow-lan: true
global-ua: clash.meta
log-level: warning
external-controller: 0.0.0.0:9090
bind-address: "*"
ipv6: false
tcp-concurrent: true
unified-delay: true
find-process-mode: strict

tun:
  enable: false
  auto-detect-interface: true
  auto-route: true
  device: Mihomo
  dns-hijack:
  - any:53
  mtu: 1500
  stack: gvisor
  strict-route: false

dns:
  enable: true
  ipv6: false
  prefer-h3: false
  listen: :53
  use-hosts: false
  use-system-hosts: false
  respect-rules: false
  enhanced-mode: fake-ip
  fake-ip-filter-mode: blacklist 
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - '*.arpa'    
    - time.*.com
    - ntp.*.com
    - "+.internal"
    - "+.localdomain"
    - "+.example"
    - "+.invalid"
    - "+.test"
    - "+.localhost"
    - '*.msftncsi.com'
    - www.msftconnecttest.com
  default-nameserver: 
    - 223.6.6.6
    - 8.8.8.8  
    - 119.29.29.29
    - 2400:3200::1
    - 2001:4860:4860::8888  
  nameserver:
    - 8.8.8.8
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: false
  proxy-server-nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  - tls://223.5.5.5
  fallback-filter:  
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32    
      
sniffer:
  enable: true
  override-destination: true
  sniff:
    QUIC:
      ports:
        - 443
        - 8443
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
  parse-pure-ip: true
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geodata-loader: standard
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb"
  asn: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb"
profile:
  store-selected: true
  store-fake-ip: true

proxy-providers:
  利群防失联:
    type: http
    url: "https://ghfast.top/https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml"
    interval: 10800
    path: ./proxy_provider/liqungongyi.yaml
    proxy: DIRECT
    header:
      User-Agent: 
        - clash.meta
    override:
      additional-prefix: "[利群防失联]"
      skip-cert-verify: false
                  
proxy-groups:
  - name: 🥳打包代理
    type: select
    proxies:
      - ✅自动选择
      - 🫱手动选择
      - DIRECT
      - ⚖️负载均衡
      - ⭕故障切换
      
  - name: 🎯国内直连
    type: select
    proxies:
      - DIRECT
      - ✅自动选择
      - 🫱手动选择
      - ⚖️负载均衡
      - ⭕故障切换

  - name: 🌀境外畅通
    type: select
    proxies:
      - DIRECT
      - ✅自动选择
      - 🫱手动选择
      - ⚖️负载均衡
      - ⭕故障切换    

  - name: ⚠️拒绝连接
    type: select
    proxies:
      - REJECT
      - ✅自动选择
      - 🫱手动选择
      - ⚖️负载均衡
      - ⭕故障切换  

  - name: ✅自动选择
    type: url-test
    interval: 43200
    lazy: true
    tolerance: 200
    url: https://www.gstatic.com/generate_204
    include-all: true
    timeout: 2000

  - name: 🫱手动选择
    type: select
    interval: 43200
    lazy: true
    include-all: true
    timeout: 2000         

  - name: ⚖️负载均衡
    type: load-balance
    interval: 43200
    lazy: true
    url: https://www.gstatic.com/generate_204
    strategy: consistent-hashing
    include-all: true
    timeout: 2000

  - name: ⭕故障切换
    type: fallback
    interval: 43200
    lazy: true
    url: https://www.gstatic.com/generate_204
    include-all: true
    timeout: 2000

