proxy-providers:
  利群防失联:
    type: http
    lazy: true
    age-secret-key: ''
    url: https://gh-proxy.org/https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml
    interval: 3600
    path: ./proxy_provider/fangshilian.yaml
    proxy: DIRECT
    header:
      User-Agent: 
        - clash.meta
    override:
      additional-prefix: '[防失联]'
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      lazy: true   

mode: rule
mixed-port: 7890
port: 7891
socks-port: 7892
redir-port: 7893
tproxy-port: 7894
allow-lan: true
log-level: info
external-controller: 0.0.0.0:9090
bind-address: '*'
external-ui-url: https://gh-proxy.org/https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
ipv6: false
tcp-concurrent: true
unified-delay: true
find-process-mode: strict
keep-alive-interval: 60
keep-alive-idle: 60

experimental:
  quic-go-disable-gso: true

tun:
  enable: false
  auto-detect-interface: true
  auto-route: true
  strict-route: true
  auto-redirect: true
  mtu: 1450
  device: mihomo
  disable-icmp-forwarding: true
  dns-hijack:
    - udp://any:53
    - tcp://any:53
  stack: mixed

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  cache-algorithm: arc
  use-hosts: true
  respect-rules: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - rule-set:private
    - rule-set:cn    
  default-nameserver:
    - 223.5.5.5
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
  nameserver:
    - https://dns.google/dns-query
  nameserver-policy:
    'rule-set:cn':
      - https://dns.alidns.com/dns-query
    'rule-set:gfw':
      - https://dns.google/dns-query
  direct-nameserver:
    - 223.5.5.5

hosts:
  dns.alidns.com:
    - 223.5.5.5
    - 223.6.6.6
  dns.google:
    - 8.8.8.8
    - 8.8.4.4
  services.googleapis.cn:
    - services.googleapis.com

profile:
  store-selected: true
  store-fake-ip: true

proxy-groups:
  - name: 🚀打包代理
    type: select
    proxies:
      - 🍀自动选择
      - 🫱手动选择
      - DIRECT
      - ⚖️负载均衡
      - ⚙️故障切换

  - name: 🇨🇳打包直连
    type: select
    proxies:
      - DIRECT
      - 🍀自动选择
      - 🫱手动选择
      - ⚖️负载均衡
      - ⚙️故障切换

  - name: 🐠漏网之鱼
    type: select
    proxies:
      - DIRECT
      - 🍀自动选择
      - 🫱手动选择
      - ⚖️负载均衡
      - ⚙️故障切换

  - name: 🍀自动选择
    type: url-test
    interval: 300
    lazy: true
    tolerance: 200
    url: https://www.gstatic.com/generate_204
    include-all: true

  - name: 🫱手动选择
    type: select
    lazy: true
    include-all: true

  - name: ⚖️负载均衡
    type: load-balance
    interval: 300
    lazy: true
    url: https://www.gstatic.com/generate_204
    strategy: sticky-sessions
    include-all: true

  - name: ⚙️故障切换
    type: fallback
    interval: 300
    lazy: true
    url: https://www.gstatic.com/generate_204
    include-all: true

  - name: ❗️广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT
      - 🍀自动选择
      - 🫱手动选择

